version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: kodkong_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kodkong_dev}
      POSTGRES_USER: ${POSTGRES_USER:-kodkong}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kodkong_dev_password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
      TZ: Asia/Bangkok
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kodkong} -d ${POSTGRES_DB:-kodkong_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kodkong_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: kodkong_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-kodkong_redis_password} --maxmemory 256mb --maxmemory-policy allkeys-lru
    environment:
      TZ: Asia/Bangkok
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kodkong_network

  # pgAdmin (Optional - Web-based PostgreSQL management)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: kodkong_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@kodkong.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - kodkong_network
    profiles:
      - tools  # Only start with: docker-compose --profile tools up

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  kodkong_network:
    driver: bridge
